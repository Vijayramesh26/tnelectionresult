name: Live Election Data Sync

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes
  push:
    branches: ["main"]    # Runs every time you push code
  workflow_dispatch:      # Allows you to run it manually

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Live Data
        run: node updater.js

      - name: Commit and Push Data Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sync live election data [skip ci]"
          file_pattern: 'data.js'

      # --- THESE STEPS FIX THE 404 ERROR ---
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # Uploads everything in the root folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
